name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install black ruff mypy types-PyYAML types-requests

      - name: black
        run: black --check ros2_ws/src/

      - name: ruff
        run: ruff check ros2_ws/src/

      - name: mypy
        run: |
          mypy ros2_ws/src/rqt_doodle/rqt_doodle/ \
               ros2_ws/src/doodle_agent/doodle_agent/ \
               --ignore-missing-imports

  test:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov anthropic pyyaml lxml

      - name: pytest (no ROS2 / API markers)
        run: |
          pytest -m "not ros2 and not api and not openscad" \
                 --cov=ros2_ws/src/doodle_agent/doodle_agent \
                 --cov-report=xml \
                 --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true
