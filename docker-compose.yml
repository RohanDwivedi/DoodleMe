services:

  # ── Setup wizard ─────────────────────────────────────────────────────────────
  # Runs once at startup. If no API key is found in ./secrets/anthropic_api_key
  # it shows a GUI dialog to collect and save the key, then exits 0.
  # The main `doodle` service waits for this to complete successfully.
  #
  # On subsequent runs the wizard detects the existing key and exits immediately.
  setup:
    build:
      context: .
      dockerfile: Dockerfile
    image: doodleme:latest
    container_name: doodle_setup

    entrypoint: ["python3", "/docker/setup_wizard.py"]

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - QT_API=pyqt5

    volumes:
      # X11 socket — needed so the wizard dialog can open on the host display
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # System secrets dir — read-write so the wizard can create the key file.
      # Lives outside the project tree so it is never accidentally committed.
      - /etc/doodleme/secrets:/secrets:rw

    security_opt:
      - label:disable

    # Run once and exit — never auto-restart
    restart: "no"

  # ── Main application ──────────────────────────────────────────────────────────
  doodle:
    build:
      context: .
      dockerfile: Dockerfile
    image: doodleme:latest
    container_name: doodle

    # Don't start until the setup wizard has exited successfully
    depends_on:
      setup:
        condition: service_completed_successfully

    environment:
      # ── Display ──────────────────────────────────────────────────────────────
      # Run `xhost +local:docker` on the host before starting.
      - DISPLAY=${DISPLAY:-:0}

      # ── Qt / OpenGL ───────────────────────────────────────────────────────────
      - QT_X11_NO_MITSHM=1
      - QT_API=pyqt5
      # Uncomment if you have no GPU or see OpenGL errors:
      # - LIBGL_ALWAYS_SOFTWARE=1

      # ── ROS2 ─────────────────────────────────────────────────────────────────
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}

    volumes:
      # X11 socket — required for the GUI window
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # API key — bind-mounted read-only from the system secrets directory.
      # settings.py reads /run/secrets/anthropic_api_key; the key never
      # passes through env vars, config files, or Docker image layers.
      - /etc/doodleme/secrets:/run/secrets:ro

      # Persistent settings (theme, paths, etc. — NOT the API key)
      - doodle_config:/root/.config/rqt_doodle

      # Generated design files: URDF, STL, .scad, BOM, wiring, KiCad
      - doodle_workspace:/root/doodle_workspace

      # Session history and crash-recovery files
      - doodle_sessions:/root/.local/share/rqt_doodle

    # Host networking is required for ROS2 DDS multicast discovery.
    # This also makes RViz2 and robot_state_publisher visible from outside.
    network_mode: host

    # GPU passthrough for hardware-accelerated OpenGL (pyvistaqt 3-D viewer).
    # Remove the `devices` block if your host has no /dev/dri.
    devices:
      - /dev/dri:/dev/dri

    # Disable SELinux/AppArmor label confinement so X11 socket access works.
    security_opt:
      - label:disable

    stdin_open: true
    tty: true

    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────────────────────
# Data persists across `docker compose down` and image rebuilds.
volumes:
  doodle_config:
    driver: local
  doodle_workspace:
    driver: local
  doodle_sessions:
    driver: local
