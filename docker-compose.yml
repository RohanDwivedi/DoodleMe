services:
  doodle:
    build:
      context: .
      dockerfile: Dockerfile
    image: doodleme:latest
    container_name: doodle

    # ── Secret ────────────────────────────────────────────────────────────────
    # Mounted read-only at /run/secrets/anthropic_api_key inside the container.
    # The key is NEVER passed as an environment variable or baked into the image.
    secrets:
      - anthropic_api_key

    environment:
      # ── Display ─────────────────────────────────────────────────────────────
      # Picks up DISPLAY from the host shell (e.g. :0 or :1).
      # Run `xhost +local:docker` on the host before starting.
      - DISPLAY=${DISPLAY:-:0}

      # ── Qt / OpenGL ──────────────────────────────────────────────────────────
      - QT_X11_NO_MITSHM=1
      - QT_API=pyqt5
      # Uncomment if you have no GPU or see OpenGL errors:
      # - LIBGL_ALWAYS_SOFTWARE=1

      # ── ROS2 ────────────────────────────────────────────────────────────────
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}

    volumes:
      # X11 socket — required for the GUI window
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Persistent settings (theme, paths, etc. — NOT the API key)
      - doodle_config:/root/.config/rqt_doodle

      # Generated design files: URDF, STL, .scad, BOM, wiring, KiCad
      - doodle_workspace:/root/doodle_workspace

      # Session history and crash-recovery files
      - doodle_sessions:/root/.local/share/rqt_doodle

    # Host networking is required for ROS2 DDS multicast discovery.
    # This also means the container shares the host's ROS2 graph,
    # so RViz2 and robot_state_publisher are visible from outside.
    network_mode: host

    # GPU passthrough for hardware-accelerated OpenGL (pyvistaqt 3-D viewer).
    # Remove the `devices` block if your host has no /dev/dri.
    devices:
      - /dev/dri:/dev/dri

    # Disable SELinux/AppArmor label confinement so X11 socket access works.
    security_opt:
      - label:disable

    # Keep stdin open so Ctrl-C works cleanly.
    stdin_open: true
    tty: true

    restart: unless-stopped

# ── Secrets ───────────────────────────────────────────────────────────────────
# Create this file before running:
#   mkdir -m 700 secrets
#   echo "sk-ant-YOUR_KEY_HERE" > secrets/anthropic_api_key.txt
#   chmod 600 secrets/anthropic_api_key.txt
#
# The file is NEVER copied into the image (see .dockerignore).
# It is mounted read-only at /run/secrets/anthropic_api_key at runtime.
secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt

# Named volumes — data persists across `docker compose down` and rebuilds.
volumes:
  doodle_config:
    driver: local
  doodle_workspace:
    driver: local
  doodle_sessions:
    driver: local
